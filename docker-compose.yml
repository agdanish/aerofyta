version: '3.8'
services:
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./agent/.env
    environment:
      - NODE_ENV=production
      - PORT=3001
    volumes:
      - agent-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - agent
    environment:
      - VITE_API_URL=http://localhost:3001/api
    restart: unless-stopped

volumes:
  agent-data:
